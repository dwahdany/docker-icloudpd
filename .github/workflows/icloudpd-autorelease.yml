# Watches PyPI for new icloudpd releases and ships a patch release of this
# container automatically — but ONLY after verifying that every internal
# icloudpd behavior the supervisor depends on (webui templates, status
# strings, cookie naming, session-token persistence, CLI flags) still holds
# in the new version, and the full test suite plus a docker build pass.
#
# If the assumption check fails, the run goes red and nothing is released:
# that is the signal that the bridge needs a human + code changes. (Blindly
# auto-bumping the pin was the legacy container's failure mode.)
#
# Everything runs inside this one workflow (git pushes made with
# GITHUB_TOKEN do not trigger other workflows), so it builds, pushes the
# image and creates the release itself.

name: icloudpd auto-release

on:
  schedule:
    - cron: "23 5 * * *"
  workflow_dispatch:

concurrency: icloudpd-autorelease

permissions:
  contents: write
  packages: write

env:
  IMAGE: ghcr.io/${{ github.repository }}

jobs:
  autorelease:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Compare pinned icloudpd with PyPI
        id: check
        run: |
          current=$(sed -n 's/^ARG icloudpd_version="\(.*\)"/\1/p' Dockerfile)
          latest=$(curl -fs https://pypi.org/pypi/icloudpd/json | jq -r .info.version)
          echo "pinned: ${current}  latest: ${latest}"
          echo "latest=${latest}" >> "$GITHUB_OUTPUT"
          if [ "$current" = "$latest" ]; then
            echo "Up to date — nothing to do."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify supervisor assumptions against the new icloudpd source
        if: steps.check.outputs.skip != 'true'
        run: python3 scripts/check_icloudpd_assumptions.py "${{ steps.check.outputs.latest }}"

      - name: Bump icloudpd pin and supervisor patch version
        if: steps.check.outputs.skip != 'true'
        id: bump
        run: |
          latest="${{ steps.check.outputs.latest }}"
          sed -i "s/^ARG icloudpd_version=.*/ARG icloudpd_version=\"${latest}\"/" Dockerfile
          old=$(sed -n 's/^version = "\(.*\)"/\1/p' supervisor/pyproject.toml)
          new=$(echo "$old" | awk -F. '{printf "%d.%d.%d", $1, $2, $3+1}')
          sed -i "s/^version = \".*\"/version = \"${new}\"/" supervisor/pyproject.toml
          sed -i "s/^__version__ = \".*\"/__version__ = \"${new}\"/" supervisor/icloudpd_supervisor/__init__.py
          echo "new=${new}" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-python@v5
        if: steps.check.outputs.skip != 'true'
        with:
          python-version: "3.12"

      - name: Run test suite
        if: steps.check.outputs.skip != 'true'
        run: |
          pip install -e "./supervisor[dev]"
          pytest supervisor/tests -q

      - uses: docker/setup-buildx-action@v3
        if: steps.check.outputs.skip != 'true'

      - name: Build image (validation, no push)
        if: steps.check.outputs.skip != 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: ${{ env.IMAGE }}:autorelease-check
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Commit and tag
        if: steps.check.outputs.skip != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -am "Bump icloudpd to ${{ steps.check.outputs.latest }} (supervisor ${{ steps.bump.outputs.new }})"
          git tag -a "v${{ steps.bump.outputs.new }}" -m "icloudpd ${{ steps.check.outputs.latest }}"
          git push origin master "v${{ steps.bump.outputs.new }}"

      - name: Log in to GHCR
        if: steps.check.outputs.skip != 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push image
        if: steps.check.outputs.skip != 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:v${{ steps.bump.outputs.new }}
            ${{ env.IMAGE }}:latest
          cache-from: type=gha

      - name: Create release
        if: steps.check.outputs.skip != 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.bump.outputs.new }}
          body: |
            Automated release: icloudpd bumped to ${{ steps.check.outputs.latest }}.

            All supervisor protocol assumptions verified against the new
            icloudpd source, full test suite and docker build passed.

            Container image: `ghcr.io/${{ github.repository }}:v${{ steps.bump.outputs.new }}`
